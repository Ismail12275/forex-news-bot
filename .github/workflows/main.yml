# ══════════════════════════════════════════════════════════════════
#  .github/workflows/main.yml
#  Forex News Alert Bot — GitHub Actions Scheduler
#
#  Runs every 30 minutes, Monday–Friday (Forex market days only).
#  Secrets required (Settings → Secrets → Actions):
#    • TELEGRAM_BOT_TOKEN  — your Telegram bot token
#    • CHAT_ID             — your channel/group chat ID (e.g. @mychannel)
#    • API_KEY             — Financial Modeling Prep free API key
#                            (get yours free at: financialmodelingprep.com)
# ══════════════════════════════════════════════════════════════════

name: 📊 Forex News Alert Bot

on:
  # ── Scheduled trigger ─────────────────────────────────────────
  schedule:
    # Every 30 minutes, Mon-Fri, during main NY session hours
    # 12:00–22:00 UTC = 08:00 AM – 06:00 PM Eastern Time
    - cron: "0,30 12-22 * * 1-5"

  # ── Manual trigger (for testing from Actions tab) ─────────────
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run"
        required: false
        default: "Manual test"

# ── Permissions ───────────────────────────────────────────────────
permissions:
  contents: read   # Read-only — bot never writes to repo

jobs:
  send-forex-alerts:
    name: Run Forex Alert Bot
    runs-on: ubuntu-latest
    timeout-minutes: 5          # Hard cap — prevent runaway jobs

    steps:
      # ── 1. Checkout source ──────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"           # Cache pip to speed up subsequent runs

      # ── 3. Install dependencies ─────────────────────────────────
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run the bot ──────────────────────────────────────────
      - name: 🤖 Run Forex Alert Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:            ${{ secrets.CHAT_ID }}
          API_KEY:            ${{ secrets.API_KEY }}
        run: python bot.py

      # ── 5. Notify on failure (optional) ─────────────────────────
      - name: 🚨 Notify failure to Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:            ${{ secrets.CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${CHAT_ID}\",
              \"text\": \"🚨 *Forex Alert Bot FAILED*\n\nGitHub Actions run failed.\nCheck: https://github.com/${{ github.repository }}/actions\",
              \"parse_mode\": \"Markdown\"
            }"
