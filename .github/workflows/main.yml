name: Forex News Bot
on:
  schedule:
    - cron: '*/30 * * * *' # يعمل كل 30 دقيقة
  workflow_dispatch: # يسمح لك بالتشغيل اليدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests Directly
        run: pip install requests # سنثبت المكتبة مباشرة لتجنب خطأ الملف

      - name: Run Bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
